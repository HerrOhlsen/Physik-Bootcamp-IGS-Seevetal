name: Build SCORM packages

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "build.mjs"
      - "modules.json"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build packages
        run: node build.mjs

      - name: Commit rebuilt packages
        run: |
          if git diff --quiet -- packages; then
            echo "Packages unchanged, nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages
          git commit -m "Rebuild SCORM packages [skip ci]"
          git push
